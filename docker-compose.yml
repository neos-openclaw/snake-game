version: '3.8'

services:
  # ============== 后端服务 ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snake-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    volumes:
      - snake_data:/app/data
    networks:
      - snake-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============== 前端服务 ==============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snake-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - snake-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  snake-network:
    driver: bridge

volumes:
  snake_data:
    driver: local
