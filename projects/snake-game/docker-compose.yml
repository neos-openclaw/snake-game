version: '3.8'

services:
  # ============== 后端服务 ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snake-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://snake:snake123@db:5432/snake_db
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-here}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - snake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============== 前端服务 ==============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snake-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - snake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============== 数据库（可选） ==============
  db:
    image: postgres:15-alpine
    container_name: snake-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=snake
      - POSTGRES_PASSWORD=snake123
      - POSTGRES_DB=snake_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snake-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snake -d snake_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== Nginx 反向代理（可选） ==============
  nginx:
    image: nginx:alpine
    container_name: snake-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - snake-network

networks:
  snake-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
